services:
  app:
    build:
      context: .
    image: corporate-it-workshop:compose
    container_name: corporate-it-workshop-app
    ports:
      - "18080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/corporate_it_workshop
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: app_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    container_name: corporate-it-workshop-db
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: corporate_it_workshop
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d corporate_it_workshop"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
